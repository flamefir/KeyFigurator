<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyFigurator Pro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Custom title bar (replaces native OS chrome) -->
    <div class="titlebar" data-tauri-drag-region>
      <span class="titlebar-title">KeyFigurator Pro</span>
      <div class="titlebar-btns">
        <button id="btn-min"   title="Minimize">&#x2013;</button>
        <button id="btn-max"   title="Maximize">&#x25A1;</button>
        <button id="btn-close" title="Close">&#x2715;</button>
      </div>
    </div>

    <!-- Fixed top-left: app title -->
    <span class="app-title">KeyFigurator Pro</span>

    <!-- Fixed top-right: Saved Layers (hover-activated) -->
    <div class="sl-wrap" id="sl-wrap">
      <button class="sl-btn" id="sl-btn">
        Saved Layers <span class="sl-plus" id="sl-plus">+</span>
      </button>
      <div class="sl-dropdown" id="sl-dropdown">
        <div class="sl-new-row" id="sl-new-row">
          <input type="text" id="sl-new-input" placeholder="Layer name…" />
          <label class="sl-import-btn" title="Import layer from JSON file">
            ↑
            <input type="file" id="sl-import-file" accept=".json" style="display:none" />
          </label>
        </div>
        <div class="sl-list" id="sl-list"></div>
      </div>
    </div>

    <header>
      <div id="conn" class="pill">checking…</div>
      <button id="btn-save-board" class="save-board-btn">Save to Board</button>
    </header>

    <div class="board-wrap">
      <div class="board-ring" id="board-ring" title="Click anywhere on the ring to open Underglow settings">
        <div class="board" id="board" title=""></div>
        <!-- Corner underglow LED pickers (one per corner) -->
        <div class="ug-corner ug-tl" id="ug-c0" title="Top-left LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
        <div class="ug-corner ug-tr" id="ug-c1" title="Top-right LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
        <div class="ug-corner ug-bl" id="ug-c2" title="Bottom-left LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
        <div class="ug-corner ug-br" id="ug-c3" title="Bottom-right LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
      </div>
      <div class="underglow-pill" id="underglow-pill">
        <div class="ug-main-row">
          <span class="pill-label">UNDERGLOW</span>
          <input type="color" id="underglow-color" value="#ff6e14" title="Set all corners" />
          <!-- Per-corner selectors inline — click opens native picker at button position -->
          <div class="ug-c-row">
            <label class="ug-c-btn" id="ug-cb-0" title="Top-left LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">TL</span>
              <input type="color" class="ug-c-inp" id="ug-ci-0" value="#ff6e14" />
            </label>
            <label class="ug-c-btn" id="ug-cb-1" title="Top-right LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">TR</span>
              <input type="color" class="ug-c-inp" id="ug-ci-1" value="#ff6e14" />
            </label>
            <label class="ug-c-btn" id="ug-cb-2" title="Bottom-left LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">BL</span>
              <input type="color" class="ug-c-inp" id="ug-ci-2" value="#ff6e14" />
            </label>
            <label class="ug-c-btn" id="ug-cb-3" title="Bottom-right LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">BR</span>
              <input type="color" class="ug-c-inp" id="ug-ci-3" value="#ff6e14" />
            </label>
          </div>
          <button class="ug-adv-btn" id="ug-adv-btn">Advanced <span id="ug-adv-arrow">▸</span></button>
        </div>
        <div class="ug-advanced" id="ug-advanced">
          <div class="ug-anims" id="ug-anims"><!-- populated by JS --></div>
          <div class="ug-sliders">
            <label class="ug-slider-row">
              <span class="pill-label">RATE</span>
              <input type="range" id="ug-rate" min="0" max="255" value="128" />
            </label>
            <label class="ug-slider-row">
              <span class="pill-label">INTENSITY</span>
              <input type="range" id="ug-intensity" min="0" max="255" value="180" />
            </label>
          </div>
          <div class="palette-row" id="ug-palette"></div>
        </div>
      </div>
      <div class="key-pills" id="key-pills">
        <div class="key-led-pill" id="key-led-pill">
          <div class="ug-main-row">
            <span class="pill-label">KEY LED</span>
            <input type="color" id="kl-color" value="#000000" title="Set LED color for selected keys" />
            <span class="kl-count" id="kl-count">1 key</span>
            <button class="ug-adv-btn" id="kl-adv-btn">Advanced <span id="kl-adv-arrow">▸</span></button>
          </div>
          <div class="ug-advanced" id="kl-advanced">
            <div class="ug-anims" id="kl-anims"></div>
            <div class="ug-sliders">
              <label class="ug-slider-row">
                <span class="pill-label">RATE</span>
                <input type="range" id="kl-rate" min="0" max="255" value="128" />
              </label>
              <label class="ug-slider-row">
                <span class="pill-label">INTENSITY</span>
                <input type="range" id="kl-intensity" min="0" max="255" value="180" />
              </label>
            </div>
            <div class="palette-row" id="kl-palette"></div>
            <div class="encoder-section" id="encoder-section">
              <span class="pill-label" style="font-size:10px;letter-spacing:0.1em">ENCODER ROTATION</span>
              <div class="enc-opts">
                <button class="enc-opt" data-mode="layer">Layer Cycle</button>
                <button class="enc-opt" data-mode="scroll">Mouse Scroll</button>
              </div>
            </div>
          </div>
        </div>
        <div class="keycode-pill" id="keycode-pill">
          <div class="ug-main-row">
            <span class="pill-label">KEYCODE</span>
            <input type="text" id="kl-kc" class="pill-kc" placeholder="KC_A · MO(1) · HOST(0)…" />
            <input type="text" id="kl-icon" class="pill-icon" placeholder="⌘" maxlength="2"
              title="Optional icon shown on keycap (emoji or 2-char label)" />
            <button class="ug-adv-btn" id="kc-adv-btn">Advanced <span id="kc-adv-arrow">▸</span></button>
          </div>
          <div class="ug-advanced" id="kc-advanced">
            <div class="kc-palette-wrap">
              <input id="kc-search" class="kc-search" placeholder="Search keycodes…" />
              <div id="kc-palette-list" class="kc-palette-list"></div>
            </div>
            <div class="hb-header">
              <span class="pill-label">HOST BINDINGS</span>
              <span class="hb-hint">Triggered by HOST(n) keycodes — each binding runs a shell command on the host.</span>
            </div>
            <div id="hb-list"></div>
            <button class="hb-add-btn" id="hb-add">+ Add Binding</button>
            <div class="hb-output" id="hb-output" style="display:none"></div>
          </div>
        </div>
      </div>
      <div class="oled-pill" id="oled-pill">
        <div class="oled-pill-nav">
          <span class="pill-label">OLED</span>
          <button class="oled-nav-btn" id="oled-nav-prev" title="Previous screen">‹</button>
          <span class="oled-screen-name-wrap"><span id="oled-screen-name">—</span></span>
          <button class="oled-nav-btn" id="oled-nav-next" title="Next screen">›</button>
          <button class="oled-enc-press" id="oled-enc-press" title="Simulate encoder press — enters/exits sub-mode for current screen">↓ Press</button>
          <button class="oled-add-screen" id="oled-add-screen" title="Add a custom text or image screen">+ Screen</button>
        </div>
        <div class="oled-pill-content" id="oled-pill-content"></div>
      </div>
    </div>


    <div id="key-tooltip"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
