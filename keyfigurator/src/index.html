<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyFigurator Pro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Custom title bar (replaces native OS chrome) -->
    <div class="titlebar" data-tauri-drag-region>
      <span class="titlebar-title">KeyFigurator Pro</span>
      <div class="titlebar-btns">
        <button id="btn-min"   title="Minimize">&#x2013;</button>
        <button id="btn-max"   title="Maximize">&#x25A1;</button>
        <button id="btn-close" title="Close">&#x2715;</button>
      </div>
    </div>

    <!-- Fixed top-left: app title -->
    <span class="app-title">KeyFigurator Pro</span>

    <!-- Fixed top-right: Saved Layers (hover-activated) -->
    <div class="sl-wrap" id="sl-wrap">
      <button class="sl-btn" id="sl-btn">
        Saved Layers <span class="sl-plus" id="sl-plus">+</span>
      </button>
      <div class="sl-dropdown" id="sl-dropdown">
        <div class="sl-new-row" id="sl-new-row">
          <input type="text" id="sl-new-input" placeholder="Layer name…" />
        </div>
        <div class="sl-list" id="sl-list"></div>
      </div>
    </div>

    <header>
      <div id="conn" class="pill">checking…</div>
    </header>

    <div class="board-wrap">
      <div class="board-ring" id="board-ring">
        <div class="board" id="board"></div>
        <!-- Corner underglow LED pickers (one per corner) -->
        <div class="ug-corner ug-tl" id="ug-c0" title="Top-left LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
        <div class="ug-corner ug-tr" id="ug-c1" title="Top-right LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
        <div class="ug-corner ug-bl" id="ug-c2" title="Bottom-left LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
        <div class="ug-corner ug-br" id="ug-c3" title="Bottom-right LED"><span class="ug-dot"></span><input type="color" class="ug-corner-inp" value="#ff6e14" /></div>
      </div>
      <div class="underglow-pill" id="underglow-pill">
        <div class="ug-main-row">
          <span class="pill-label">UNDERGLOW</span>
          <input type="color" id="underglow-color" value="#ff6e14" title="Set all corners" />
          <!-- Per-corner selectors inline — click opens native picker at button position -->
          <div class="ug-c-row">
            <label class="ug-c-btn" id="ug-cb-0" title="Top-left LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">TL</span>
              <input type="color" class="ug-c-inp" id="ug-ci-0" value="#ff6e14" />
            </label>
            <label class="ug-c-btn" id="ug-cb-1" title="Top-right LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">TR</span>
              <input type="color" class="ug-c-inp" id="ug-ci-1" value="#ff6e14" />
            </label>
            <label class="ug-c-btn" id="ug-cb-2" title="Bottom-left LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">BL</span>
              <input type="color" class="ug-c-inp" id="ug-ci-2" value="#ff6e14" />
            </label>
            <label class="ug-c-btn" id="ug-cb-3" title="Bottom-right LED">
              <span class="ug-c-dot"></span>
              <span class="ug-c-lbl">BR</span>
              <input type="color" class="ug-c-inp" id="ug-ci-3" value="#ff6e14" />
            </label>
          </div>
          <button class="ug-adv-btn" id="ug-adv-btn">Advanced <span id="ug-adv-arrow">▸</span></button>
        </div>
        <div class="ug-advanced" id="ug-advanced">
          <div class="ug-anims" id="ug-anims"><!-- populated by JS --></div>
          <div class="ug-sliders">
            <label class="ug-slider-row">
              <span class="pill-label">RATE</span>
              <input type="range" id="ug-rate" min="0" max="255" value="128" />
            </label>
            <label class="ug-slider-row">
              <span class="pill-label">INTENSITY</span>
              <input type="range" id="ug-intensity" min="0" max="255" value="180" />
            </label>
          </div>
        </div>
      </div>
      <div class="settings-pill" id="settings-pill">
        <div class="pill-section">
          <span class="pill-label">LED</span>
          <input type="color" id="pill-color" value="#ff7a1e" title="Key LED color" />
          <input type="range" id="pill-bright" class="pill-bright" min="0" max="255" value="180" title="Brightness" />
        </div>
        <div class="pill-sep"></div>
        <div class="pill-section">
          <span class="pill-label">MACRO</span>
          <input type="text" id="pill-kc" class="pill-kc" placeholder="KC_A · MO(1) · HOST(0)…" />
        </div>
      </div>
    </div>


    <script type="module" src="main.js"></script>
  </body>
</html>
